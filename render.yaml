services:
  - type: web
    name: bibliotecaar-backend
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: bibliotecaar-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://bibliotecaar-backend.onrender.com,https://bibliotecaar-fronted.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://bibliotecaar-fronted.vercel.app
      - key: SERVE_MEDIA_FILES
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL_REQUIRE
        value: "True"
      - key: USE_SUPABASE_STORAGE
        value: "True"
      - key: SUPABASE_STORAGE_BUCKET_NAME
        value: media
      - key: SUPABASE_STORAGE_ENDPOINT_URL
        sync: false
      - key: SUPABASE_STORAGE_PUBLIC_URL
        sync: false
      - key: SUPABASE_STORAGE_ACCESS_KEY_ID
        sync: false
      - key: SUPABASE_STORAGE_SECRET_ACCESS_KEY
        sync: false
